name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install django coverage flake8 bandit

    - name: Run Linters (Checkstyle equivalent)
      run: |
        # Перевірка синтаксису та стилю коду (PEP8)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Security Analysis (Code Smells/Security)
      run: |
        # Пошук вразливостей та потенційних помилок
        bandit -r .

    - name: Run Tests
      run: |
        python manage.py test